services:
  postgres:
    image: postgres:18
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_secret
      POSTGRES_DB: erp_db
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - erp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp -d erp_db']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: erp-redis
    restart: unless-stopped
    command: ['redis-server', '--requirepass', 'erp_redis_secret']
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - erp_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'erp_redis_secret', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  erp_postgres_data:
  erp_redis_data:
