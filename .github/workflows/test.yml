name: Test

on:
  workflow_call:

jobs:
  test:
    name: Build & E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp_secret
          POSTGRES_DB: erp_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d erp_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://erp:erp_secret@localhost:5432/erp_db?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: '6380'
      REDIS_PASSWORD: ''
      JWT_SECRET: ci-test-jwt-secret-please-change-in-prod-0123456789
      JWT_REFRESH_SECRET: ci-test-refresh-secret-please-change-in-prod-0123456789
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      COOKIE_SECURE: 'false'
      API_PORT: '3000'
      API_CORS_ORIGIN: http://localhost:5173
      UPLOAD_MAX_BYTES: '5242880'
      TEST_ADMIN_EMAIL: admin@example.com
      TEST_ADMIN_PHONE: '0900000000'
      TEST_ADMIN_PASSWORD: change-me-ci
      TEST_ADMIN_FULL_NAME: E2E Admin
      VITE_API_URL: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Build shared packages
        run: |
          pnpm --filter @erp/shared build
          pnpm --filter @erp/organization-io build
          pnpm --filter @erp/employee-io build

      - name: Apply database migrations
        run: pnpm exec prisma migrate deploy

      - name: API e2e tests
        run: pnpm --filter @erp/api test

      - name: Install Playwright browsers
        run: pnpm --filter @erp/web exec playwright install --with-deps chromium

      - name: Web e2e tests (Playwright)
        run: pnpm --filter @erp/web test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 7
          if-no-files-found: ignore
